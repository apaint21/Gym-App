index.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker - Day 3 (1hr)</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; }
#workout-form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
input, select, button { padding: 10px; font-size: 16px; }
input[readonly] { background-color: #e9ecef; }
button { cursor: pointer; background-color: #28a745; color: white; border: none; }
button:hover { background-color: #218838; }
ul { list-style: none; padding: 0; max-width: 650px; margin: 0 auto; }
li { background: white; margin: 5px 0; padding: 10px; border-left: 5px solid #28a745; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
.delete-btn { background-color: #dc3545; border: none; padding: 5px 10px; color: white; cursor: pointer; margin-left: 5px; }
.delete-btn:hover { background-color: #c82333; }
.session-info { flex: 1; margin-right: 10px; }
.session-meta { font-size: 0.9em; color: #555; }
.history { font-size: 0.8em; color: #888; margin-top: 5px; }
.sub-exercise { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
</style>
</head>
<body>
<h1>Day 3 (1hr) Workout</h1>

<form id="workout-form">
  <select id="exercise-input" required></select>
  
  <div id="normal-inputs">
    <input type="number" id="reps-input" placeholder="Reps Completed" min="1">
    <input type="number" id="sets-input" placeholder="Sets" readonly>
    <input type="number" id="weight-input" placeholder="Weight Used">
    <select id="side-input">
      <option value="">Single/Both</option>
      <option value="Single Leg/Arm">Single Leg/Arm</option>
      <option value="Bilateral">Both</option>
    </select>
    <select id="equip-input">
      <option value="">Equipment</option>
      <option value="BB">Barbell (BB)</option>
      <option value="DB">Dumbbell (DB)</option>
      <option value="KB">Kettlebell (KB)</option>
      <option value="BW">Bodyweight (BW)</option>
    </select>
    <select id="mood-input">
      <option value="">Mood</option>
      <option value="Easy">Easy</option>
      <option value="Stay">Stay</option>
      <option value="Hard">Hard</option>
    </select>
  </div>

  <!-- Superset container with independent inputs for each sub-exercise -->
  <div id="superset-container" style="display:none; flex-direction: column; gap:10px;">
    
    <div class="sub-exercise">
      <strong>Sub-Exercise 1</strong>
      <select id="sub1-select"></select>
      <input type="number" id="sub1-reps" placeholder="Reps">
      <input type="number" id="sub1-weight" placeholder="Weight">
      <select id="sub1-side">
        <option value="">Single/Both</option>
        <option value="Single Leg/Arm">Single Leg/Arm</option>
        <option value="Bilateral">Both</option>
      </select>
      <select id="sub1-equip">
        <option value="">Equipment</option>
        <option value="BB">Barbell (BB)</option>
        <option value="DB">Dumbbell (DB)</option>
        <option value="KB">Kettlebell (KB)</option>
        <option value="BW">Bodyweight (BW)</option>
      </select>
      <select id="sub1-mood">
        <option value="">Mood</option>
        <option value="Easy">Easy</option>
        <option value="Stay">Stay</option>
        <option value="Hard">Hard</option>
      </select>
      <div id="sub1-history" class="history"></div>
    </div>

    <div class="sub-exercise">
      <strong>Sub-Exercise 2</strong>
      <select id="sub2-select"></select>
      <input type="number" id="sub2-reps" placeholder="Reps">
      <input type="number" id="sub2-weight" placeholder="Weight">
      <select id="sub2-side">
        <option value="">Single/Both</option>
        <option value="Single Leg/Arm">Single Leg/Arm</option>
        <option value="Bilateral">Both</option>
      </select>
      <select id="sub2-equip">
        <option value="">Equipment</option>
        <option value="BB">Barbell (BB)</option>
        <option value="DB">Dumbbell (DB)</option>
        <option value="KB">Kettlebell (KB)</option>
        <option value="BW">Bodyweight (BW)</option>
      </select>
      <select id="sub2-mood">
        <option value="">Mood</option>
        <option value="Easy">Easy</option>
        <option value="Stay">Stay</option>
        <option value="Hard">Hard</option>
      </select>
      <div id="sub2-history" class="history"></div>
    </div>

  </div>

  <button type="submit">Add Session</button>
</form>

<ul id="workout-list"></ul>
<button id="clear-btn">Clear All Sessions</button>

<script>
const form = document.getElementById('workout-form');
const exerciseInput = document.getElementById('exercise-input');
const setsInput = document.getElementById('sets-input');

let workoutsData = JSON.parse(localStorage.getItem('day3_1hr')) || [];

const exercises = [
  { name: 'Squat', sets: 3, reps: '8-10', rest: '90 sec', type:'normal' },
  { name: 'Hip Thrust or Glute Bridge', sets: 3, reps: '8-12', rest: '90 sec', type:'normal' },
  { name: 'Bi/Tri Superset', sets: 2, reps: '10-12', rest: '60 sec', type:'superset', subExercises: [
      { name: 'EZ Bar Curl' },
      { name: 'DB Curl' },
      { name: 'Rope Pushdown' },
      { name: 'Overhead Extension' }
  ]}
];

// Populate main exercise dropdown
function populateExerciseDropdown(){
  exerciseInput.innerHTML='';
  exercises.forEach(ex=>{
    const opt=document.createElement('option');
    opt.value=ex.name;
    opt.textContent=ex.name;
    exerciseInput.appendChild(opt);
  });
}
populateExerciseDropdown();

// Render workout history
function renderWorkouts(){
  const list=document.getElementById('workout-list');
  list.innerHTML='';
  workoutsData.forEach((s,i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<div class="session-info"><strong>${s.exercise}</strong> - ${s.sets} sets x ${s.reps} reps @ ${s.weight} ${s.side} | ${s.equipment} | Mood: ${s.mood}</div>`;
    const delBtn=document.createElement('button');
    delBtn.textContent='Delete';
    delBtn.classList.add('delete-btn');
    delBtn.addEventListener('click',()=>{workoutsData.splice(i,1); localStorage.setItem('day3_1hr', JSON.stringify(workoutsData)); renderWorkouts();});
    li.appendChild(delBtn);
    list.appendChild(li);
  });
}
renderWorkouts();

// Handle exercise change
exerciseInput.addEventListener('change',()=>{
  const ex=exercises.find(e=>e.name===exerciseInput.value);
  setsInput.value=ex.sets;
  if(ex.type==='superset'){
    document.getElementById('superset-container').style.display='flex';
    // Populate sub-exercises
    const sub1Select=document.getElementById('sub1-select');
    const sub2Select=document.getElementById('sub2-select');
    sub1Select.innerHTML=''; sub2Select.innerHTML='';
    ['EZ Bar Curl','DB Curl'].forEach(n=>{const o=document.createElement('option'); o.value=n; o.textContent=n; sub1Select.appendChild(o);});
    ['Rope Pushdown','Overhead Extension'].forEach(n=>{const o=document.createElement('option'); o.value=n; o.textContent=n; sub2Select.appendChild(o);});
    updateHistory(sub1Select,'sub1-history'); updateHistory(sub2Select,'sub2-history');
    document.getElementById('normal-inputs').style.display='none';
  } else {
    document.getElementById('superset-container').style.display='none';
    document.getElementById('normal-inputs').style.display='flex';
  }
});

function updateHistory(selectElem,id){
  const last=workoutsData.slice().reverse().find(s=>s.exercise===selectElem.value);
  document.getElementById(id).textContent=last?`Last: ${last.reps} reps @ ${last.weight} ${last.side} | ${last.equipment} | Mood: ${last.mood}`:'';
}

// Update history on sub-exercise change
document.getElementById('sub1-select').addEventListener('change',()=>updateHistory(document.getElementById('sub1-select'),'sub1-history'));
document.getElementById('sub2-select').addEventListener('change',()=>updateHistory(document.getElementById('sub2-select'),'sub2-history'));

// Submit form
form.addEventListener('submit',e=>{
  e.preventDefault();
  const exName=exerciseInput.value;
  if(exName==='Bi/Tri Superset'){
    const sub1={ exercise: document.getElementById('sub1-select').value, sets: setsInput.value, reps: document.getElementById('sub1-reps').value, weight: document.getElementById('sub1-weight').value, side: document.getElementById('sub1-side').value, equipment: document.getElementById('sub1-equip').value, mood: document.getElementById('sub1-mood').value };
    const sub2={ exercise: document.getElementById('sub2-select').value, sets: setsInput.value, reps: document.getElementById('sub2-reps').value, weight: document.getElementById('sub2-weight').value, side: document.getElementById('sub2-side').value, equipment: document.getElementById('sub2-equip').value, mood: document.getElementById('sub2-mood').value };
    workoutsData.push(sub1,sub2);
  } else {
    const normal={ exercise: exName, sets: setsInput.value, reps: document.getElementById('reps-input').value, weight: document.getElementById('weight-input').value, side: document.getElementById('side-input').value, equipment: document.getElementById('equip-input').value, mood: document.getElementById('mood-input').value };
    workoutsData.push(normal);
  }
  localStorage.setItem('day3_1hr', JSON.stringify(workoutsData));
  renderWorkouts();
  form.reset();
  setsInput.value=exercises.find(e=>e.name===exerciseInput.value).sets;
  document.getElementById('superset-container').style.display='none';
  document.getElementById('normal-inputs').style.display='flex';
});

// Clear all
document.getElementById('clear-btn').addEventListener('click',()=>{workoutsData=[]; localStorage.setItem('day3_1hr', JSON.stringify(workoutsData)); renderWorkouts();});
</script>
</body>
</html>
