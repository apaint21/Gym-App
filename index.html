Gym Tracker App html code

index.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker - Full Sessions</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; }
.tabs { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; gap: 5px; }
.tab { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px 4px 0 0; }
.tab.active { background-color: #0056b3; font-weight: bold; }
#workout-form { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 10px; }
input, select, button { padding: 10px; font-size: 16px; }
button { cursor: pointer; background-color: #28a745; color: white; border: none; }
button:hover { background-color: #218838; }
ul { list-style: none; padding: 0; max-width: 650px; margin: 0 auto; }
li { background: white; margin: 5px 0; padding: 10px; border-left: 5px solid #28a745; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
.delete-btn { background-color: #dc3545; border: none; padding: 5px 10px; color: white; cursor: pointer; margin-left: 5px; }
.delete-btn:hover { background-color: #c82333; }
#clear-btn, #export-btn { display:block; margin: 10px auto; background-color:#007bff; }
.session-info { flex: 1; margin-right: 10px; }
.session-meta { font-size: 0.9em; color: #555; }
.pr { color: gold; font-weight: bold; margin-left: 5px; }
.superset-select { margin: 5px 5px 5px 0; }
</style>
</head>
<body>

<h1>Workout Tracker</h1>

<div class="tabs">
<button class="tab active" data-day="day1_1hr">Day 1 (1hr)</button>
<button class="tab" data-day="day2_1hr">Day 2 (1hr)</button>
<button class="tab" data-day="day3_1hr">Day 3 (1hr)</button>
<button class="tab" data-day="day1_lt1hr">Day 1 (&lt;1hr)</button>
<button class="tab" data-day="day2_lt1hr">Day 2 (&lt;1hr)</button>
<button class="tab" data-day="day3_lt1hr">Day 3 (&lt;1hr)</button>
</div>

<form id="workout-form">
<select id="exercise-input" required></select>
<span id="rest-display" style="margin-left:10px; font-weight:bold;"></span>
<input type="number" id="reps-input" placeholder="Reps Completed" min="1" required>
<input type="number" id="sets-input" placeholder="Sets" min="1" required readonly>
<input type="number" id="weight-input" placeholder="Weight">
<select id="side-input" required>
<option value="">Single/Both</option>
<option value="Single Leg/Arm">Single Leg/Arm</option>
<option value="Bilateral">Both</option>
</select>
<select id="equip-input" required>
<option value="">Equipment</option>
<option value="BB">Barbell (BB)</option>
<option value="DB">Dumbbell (DB)</option>
<option value="KB">Kettlebell (KB)</option>
<option value="BW">Bodyweight (BW)</option>
</select>
<select id="mood-input" required>
<option value="">Mood</option>
<option value="Easy">Easy</option>
<option value="Stay">Stay</option>
<option value="Hard">Hard</option>
</select>
<button type="submit">Add Session</button>
</form>

<div id="superset-container" style="max-width:650px;margin:10px auto;"></div>

<ul id="workout-list"></ul>

<button id="clear-btn">Clear All Sessions for This Day</button>
<button id="export-btn">Export to Excel</button>

<script>
const tabs = document.querySelectorAll('.tab');
const form = document.getElementById('workout-form');
const exerciseInput = document.getElementById('exercise-input');
const repsInput = document.getElementById('reps-input');
const setsInput = document.getElementById('sets-input');
const weightInput = document.getElementById('weight-input');
const sideInput = document.getElementById('side-input');
const equipInput = document.getElementById('equip-input');
const moodInput = document.getElementById('mood-input');
const list = document.getElementById('workout-list');
const clearBtn = document.getElementById('clear-btn');
const supersetContainer = document.getElementById('superset-container');
const restDisplay = document.getElementById('rest-display');
const exportBtn = document.getElementById('export-btn');

let currentDay = 'day1_1hr';
let workoutsData = {};

// Preloaded exercises (1hr and <1hr) including supersets
const preloadedExercises = {
  day1_1hr: [
    { name: 'Squat', sets: 3, reps: '12-15', rest: '2-3 min', type:'normal' },
    { name: 'RDL', sets: 3, reps: '6-8', rest: '90 sec', type:'normal' },
    { name: 'Incline DB Press', sets: 3, reps: '6-8', rest: '75-90 sec', type:'normal' },
    { name: 'Row', sets: 3, reps: '8-10', rest: '75-90 sec', type:'normal' },
    { name: 'Plank', sets: 2, reps: '60 sec', rest: '', type:'normal' }
  ],
  day1_lt1hr: [
    { name: 'Squat', sets: 3, reps: '12-15', rest: '120 sec', type:'normal' },
    { name: 'Chest/Back Superset', sets: 3, reps: '6-10', rest: '60-75 sec', type:'superset', subExercises:[
      { name:'Incline Press', sets:3, reps:'6-8' },
      { name:'Row', sets:3, reps:'8-10' }
    ]},
    { name: 'RDL', sets: 3, reps: '6-8', rest: '75-90 sec', type:'normal' },
    { name: 'Plank', sets: 2, reps: '60', rest: '', type:'normal' }
  ],
  // Add day2/day3 1hr and <1hr similarly...
};

// Load saved data
if(localStorage.getItem('workoutsData')) {
  workoutsData = JSON.parse(localStorage.getItem('workoutsData'));
}

// Populate exercise dropdown
function populateExerciseDropdown() {
  exerciseInput.innerHTML = '';
  const exercises = preloadedExercises[currentDay];
  exercises.forEach(ex => {
    const opt = document.createElement('option');
    opt.value = ex.name;
    opt.textContent = ex.name;
    exerciseInput.appendChild(opt);
  });
  updateExerciseDetails();
}

// Update sets/rest when an exercise is selected
function updateExerciseDetails() {
  const selected = preloadedExercises[currentDay].find(e => e.name === exerciseInput.value);
  if(selected){
    setsInput.value = selected.sets;
    restDisplay.textContent = selected.rest;
    if(selected.type==='superset'){
      renderSupersetOptions(selected);
    } else {
      supersetContainer.innerHTML = '';
    }
    // Auto-fill last weight
    const past = (workoutsData[currentDay]||[]).filter(s=>s.exercise===selected.name);
    if(past.length) weightInput.value = past[past.length-1].weight || '';
    else weightInput.value='';
  }
}

// Render superset dropdowns
function renderSupersetOptions(ex){
  supersetContainer.innerHTML = '';
  ex.subExercises.forEach((sub,i)=>{
    const sel = document.createElement('select');
    sel.classList.add('superset-select');
    sel.dataset.parent = ex.name;
    sel.dataset.index = i;
    const defaultOpt = document.createElement('option');
    defaultOpt.value='';
    defaultOpt.textContent = 'Select '+sub.name;
    sel.appendChild(defaultOpt);
    ['BB','DB','KB','BW'].forEach(eq=>{
      const o = document.createElement('option'); o.value=eq;o.textContent=eq; sel.appendChild(o);
    });
    // Auto-fill previous weight
    const past = (workoutsData[currentDay]||[]).filter(s=>s.exercise===sub.name);
    if(past.length && past[past.length-1].weight) sel.value = past[past.length-1].weight;
    supersetContainer.appendChild(sel);
  });
}

// Render all workouts
function renderWorkouts(){
  list.innerHTML='';
  const sessions = workoutsData[currentDay]||[];
  sessions.forEach((s,index)=>{
    const li = document.createElement('li');
    li.innerHTML = `<div class="session-info"><strong>${s.exercise}</strong> - ${s.sets} sets x ${s.reps} reps<div class="session-meta">${s.side} | ${s.equipment} | Mood: ${s.mood} | Weight: ${s.weight||''}</div></div>`;
    const delBtn = document.createElement('button');
    delBtn.textContent='Delete'; delBtn.classList.add('delete-btn');
    delBtn.addEventListener('click',()=>{
      workoutsData[currentDay].splice(index,1);
      localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
      renderWorkouts();
    });
    li.appendChild(delBtn);
    list.appendChild(li);
  });
}

// Form submit
form.addEventListener('submit',e=>{
  e.preventDefault();
  const exercise = exerciseInput.value;
  const reps = repsInput.value;
  const sets = setsInput.value;
  const weight = weightInput.value;
  const side = sideInput.value;
  const equipment = equipInput.value;
  const mood = moodInput.value;
  if(!workoutsData[currentDay]) workoutsData[currentDay]=[];
  workoutsData[currentDay].push({exercise,reps,sets,weight,side,equipment,mood});
  localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
  renderWorkouts();
  form.reset();
  setsInput.value='';
  restDisplay.textContent='';
  supersetContainer.innerHTML='';
});

// Tab switching
tabs.forEach(tab=>{
  tab.addEventListener('click',()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentDay = tab.dataset.day;
    populateExerciseDropdown();
    renderWorkouts();
  });
});

clearBtn.addEventListener('click',()=>{
  workoutsData[currentDay]=[];
  localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
  renderWorkouts();
});

exportBtn.addEventListener('click',()=>{
  const rows = [['Exercise','Sets','Reps','Weight','Side','Equipment','Mood']];
  (workoutsData[currentDay]||[]).forEach(s=>{
    rows.push([s.exercise,s.sets,s.reps,s.weight||'',s.side,s.equipment,s.mood]);
  });
  let csvContent = "data:text/csv;charset=utf-8," + rows.map(r=>r.join(",")).join("\n");
  const encodedUri = encodeURI(csvContent);
  const link = document.createElement('a'); link.setAttribute('href', encodedUri);
  link.setAttribute('download', currentDay+"_workouts.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

// Initial setup
populateExerciseDropdown();
renderWorkouts();

exerciseInput.addEventListener('change', updateExerciseDetails);
</script>
</body>
</html>
