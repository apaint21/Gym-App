Gym Tracker App html code

index.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker - Full Sessions</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; }
.tabs { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; gap: 5px; }
.tab { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px 4px 0 0; }
.tab.active { background-color: #0056b3; font-weight: bold; }
#workout-form { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 10px; }
input, select, button { padding: 10px; font-size: 16px; }
button { cursor: pointer; background-color: #28a745; color: white; border: none; }
button:hover { background-color: #218838; }
ul { list-style: none; padding: 0; max-width: 650px; margin: 0 auto; }
li { background: white; margin: 5px 0; padding: 10px; border-left: 5px solid #28a745; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
.delete-btn { background-color: #dc3545; border: none; padding: 5px 10px; color: white; cursor: pointer; margin-left: 5px; }
.delete-btn:hover { background-color: #c82333; }
#clear-btn { display:block; margin: 20px auto; background-color:#007bff; }
.session-info { flex: 1; margin-right: 10px; }
.session-meta { font-size: 0.9em; color: #555; }
.pr { color: gold; font-weight: bold; margin-left: 5px; }
</style>
</head>
<body>

<h1>Workout Tracker</h1>

<div class="tabs">
<button class="tab active" data-day="day1_1hr">Day 1 (1hr)</button>
<button class="tab" data-day="day2_1hr">Day 2 (1hr)</button>
<button class="tab" data-day="day3_1hr">Day 3 (1hr)</button>
<button class="tab" data-day="day1_lt1hr">Day 1 (&lt;1hr)</button>
<button class="tab" data-day="day2_lt1hr">Day 2 (&lt;1hr)</button>
<button class="tab" data-day="day3_lt1hr">Day 3 (&lt;1hr)</button>
<button class="tab" data-day="progress">Progress</button>
</div>

<form id="workout-form">
<select id="exercise-input" required></select>
<span id="rest-display" style="margin-left:10px; font-weight:bold;"></span>

<input type="number" id="reps-input" placeholder="Reps Completed" min="1" required>
<input type="number" id="sets-input" placeholder="Sets" min="1" required readonly>
<input type="number" id="weight-input" placeholder="Weight" min="0">

<select id="side-input" required>
<option value="">Single/Both</option>
<option value="Single Leg/Arm">Single Leg/Arm</option>
<option value="Bilateral">Both</option>
</select>

<select id="equip-input" required>
<option value="">Equipment</option>
<option value="BB">Barbell (BB)</option>
<option value="DB">Dumbbell (DB)</option>
<option value="KB">Kettlebell (KB)</option>
<option value="BW">Bodyweight (BW)</option>
</select>

<select id="mood-input" required>
<option value="">Mood</option>
<option value="Easy">Easy</option>
<option value="Stay">Stay</option>
<option value="Hard">Hard</option>
</select>

<button type="submit">Add Session</button>
</form>

<div id="superset-container" style="max-width:650px;margin:10px auto;"></div>

<ul id="workout-list"></ul>

<button id="clear-btn">Clear All Sessions for This Day</button>
<button id="export-btn" style="display:block;margin:10px auto;">Export to Excel</button>

<script>
const tabs = document.querySelectorAll('.tab');
const form = document.getElementById('workout-form');
const exerciseInput = document.getElementById('exercise-input');
const repsInput = document.getElementById('reps-input');
const setsInput = document.getElementById('sets-input');
const weightInput = document.getElementById('weight-input');
const sideInput = document.getElementById('side-input');
const equipInput = document.getElementById('equip-input');
const moodInput = document.getElementById('mood-input');
const list = document.getElementById('workout-list');
const clearBtn = document.getElementById('clear-btn');

let currentDay = 'day1_1hr';
let workoutsData = {};
let currentSupersetSelections = [];

const preloadedExercises = {
  day1_1hr: [
    { name: 'Squat', sets: 3, reps: '12-15', rest: '2-3 min', type:'normal' },
    { name: 'RDL', sets: 3, reps: '6-8', rest: '90 sec', type:'normal' },
    { name: 'Incline DB Press', sets: 3, reps: '6-8', rest: '75-90 sec', type:'normal' },
    { name: 'Row', sets: 3, reps: '8-10', rest: '75-90 sec', type:'normal' },
    { name: 'Plank', sets: 2, reps: '60 sec', rest: '', type:'normal' }
  ],
  day2_1hr: [
    { name: 'Pull-Ups or Lat Pulldown', sets: 4, reps: 'AMAP', rest: '90-120 sec', type:'normal' },
    { name: 'DB Bench', sets: 3, reps: '8-10', rest: '120 sec', type:'normal' },
    { name: 'Bulgarian Split Squat', sets: 3, reps: '8 / leg', rest: '60 sec', type:'normal' },
    { name: 'Hamstring Curl', sets: 2, reps: '10-12', rest: '60 sec', type:'normal' },
    { name: 'Face Pulls', sets: 2, reps: '12-15', rest: '60 sec', type:'normal' }
  ],
  day3_1hr: [
    { name: 'Squat', sets: 3, reps: '8-10', rest: '90 sec', type:'normal' },
    { name: 'Hip Thrust or Glute Bridge', sets: 3, reps: '8-12', rest: '90 sec', type:'normal' },
    { name: 'DB Row', sets: 3, reps: '8-10', rest: '90 sec', type:'normal' },
    { name: 'Incline DB Press', sets: 3, reps: '8-10', rest: '75-90 sec', type:'normal' },
    { name: 'Bi/Tri Superset', sets: 2, reps: '10-12', rest: '60 sec', type:'superset', subExercises: [
      { name: 'Ez Bar Curl' },
      { name: 'DB Curl' },
      { name: 'Rope Pushdown' },
      { name: 'Overhead Extension' }
    ]}
  ]
};

if(localStorage.getItem('workoutsData')) {
  workoutsData = JSON.parse(localStorage.getItem('workoutsData'));
}

function getPRs() {
  let prs = {};
  Object.values(workoutsData).forEach(day => {
    day.forEach(e => {
      if (!prs[e.exercise] || e.weight > prs[e.exercise]) {
        prs[e.exercise] = Number(e.weight);
      }
    });
  });
  return prs;
}

function populateExerciseDropdown() {
  exerciseInput.innerHTML = '';
  preloadedExercises[currentDay].forEach(ex => {
    const opt = document.createElement('option');
    opt.value = ex.name;
    opt.textContent = ex.name;
    exerciseInput.appendChild(opt);
  });
}

function showRestInfo(ex) {
  document.getElementById('rest-display').textContent = ex.rest ? `Rest: ${ex.rest}` : '';
}

function autofillLastWeight(name) {
  let history = [];
  Object.values(workoutsData).forEach(day => {
    day.forEach(e => {
      if (e.exercise === name) history.push(e);
    });
  });
  if (history.length) weightInput.value = history[history.length - 1].weight || '';
}

function handleSupersetSelection(ex) {
  const container = document.getElementById('superset-container');
  container.innerHTML = '';
  currentSupersetSelections = [];

  if (ex.type === 'superset') {
    for (let i = 0; i < 2; i++) {
      const select = document.createElement('select');
      select.innerHTML = `<option value="">Select Exercise</option>`;

      ex.subExercises.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.name;
        o.textContent = opt.name;
        select.appendChild(o);
      });

      const historyDiv = document.createElement('div');

      select.addEventListener('change', () => {
        currentSupersetSelections[i] = select.value;
        showHistory(select.value, historyDiv);
        autofillLastWeight(select.value);
      });

      container.appendChild(select);
      container.appendChild(historyDiv);
    }
  }
}

function showHistory(name, el) {
  let history = [];
  Object.values(workoutsData).forEach(day => {
    day.forEach(e => {
      if (e.exercise === name) history.push(e);
    });
  });

  if (!history.length) return el.textContent = 'No history';

  const last = history[history.length - 1];
  el.textContent = `Last: ${last.weight || 0} lbs x ${last.reps}`;
}

function renderWorkouts() {
  if (currentDay === 'progress') return renderProgress();

  list.innerHTML = '';
  const sessions = workoutsData[currentDay] || [];
  const prs = getPRs();

  // ✅ RESTORE: Preloaded exercises display
  preloadedExercises[currentDay].forEach(ex => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div class="session-info">
        <strong>${ex.name}</strong> - ${ex.sets} sets x ${ex.reps}
        <div class="session-meta">Rest: ${ex.rest}</div>
      </div>
    `;
    list.appendChild(li);
  });

  // ✅ User sessions (with PR highlight)
  sessions.forEach((s,i)=>{
    const isPR = Number(s.weight) === prs[s.exercise];

    const li = document.createElement('li');
    li.innerHTML = `
      <div class="session-info">
        <strong>${s.exercise}</strong> - ${s.sets} sets x ${s.reps}
        ${isPR ? '<span class="pr">🏆 PR</span>' : ''}
        <div class="session-meta">${s.weight || 0} lbs | ${s.side} | ${s.equipment} | Mood: ${s.mood}</div>
      </div>
    `;

    const btn = document.createElement('button');
    btn.textContent='Delete';
    btn.classList.add('delete-btn');
    btn.onclick=()=>{
      workoutsData[currentDay].splice(i,1);
      localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
      renderWorkouts();
    };

    li.appendChild(btn);
    list.appendChild(li);
  });
}
  
function renderProgress() {
  list.innerHTML = '';
  const prs = getPRs();

  Object.keys(prs).forEach(ex => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div class="session-info">
        <strong>${ex}</strong>
        <div class="session-meta">🏆 Best: ${prs[ex]} lbs</div>
      </div>
    `;
    list.appendChild(li);
  });
}

exerciseInput.addEventListener('change', () => {
  const ex = preloadedExercises[currentDay].find(e=>e.name===exerciseInput.value);
  if (!ex) return;
  setsInput.value = ex.sets;
  showRestInfo(ex);
  handleSupersetSelection(ex);
  autofillLastWeight(ex.name);
});

form.addEventListener('submit', e=>{
  e.preventDefault();

  const exName = exerciseInput.value;
  const reps = repsInput.value;
  const sets = setsInput.value;
  const weight = weightInput.value;
  const side = sideInput.value;
  const equipment = equipInput.value;
  const mood = moodInput.value;

  if(!workoutsData[currentDay]) workoutsData[currentDay]=[];

  const ex = preloadedExercises[currentDay].find(e=>e.name===exName);

  if (ex.type === 'superset') {
    currentSupersetSelections.forEach(name=>{
      if(name){
        workoutsData[currentDay].push({exercise:name,reps,sets,weight,side,equipment,mood});
      }
    });
  } else {
    workoutsData[currentDay].push({exercise:exName,reps,sets,weight,side,equipment,mood});
  }

  localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
  renderWorkouts();
  form.reset();
  document.getElementById('superset-container').innerHTML='';
  document.getElementById('rest-display').textContent='';
});

document.getElementById('export-btn').addEventListener('click', () => {
  let rows = [["Day","Exercise","Sets","Reps","Weight","Side","Equipment","Mood"]];
  Object.keys(workoutsData).forEach(day => {
    workoutsData[day].forEach(entry => {
      rows.push([day,entry.exercise,entry.sets,entry.reps,entry.weight || 0,entry.side,entry.equipment,entry.mood]);
    });
  });

  let csv = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
  const link = document.createElement("a");
  link.setAttribute("href", encodeURI(csv));
  link.setAttribute("download", "workout_data.csv");
  document.body.appendChild(link);
  link.click();
});

tabs.forEach(tab=>{
  tab.onclick=()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentDay=tab.dataset.day;
    populateExerciseDropdown();
    renderWorkouts();
  };
});

clearBtn.onclick=()=>{
  workoutsData[currentDay]=[];
  localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
  renderWorkouts();
};

populateExerciseDropdown();
renderWorkouts();
</script>

</body>
</html>
