Gym Tracker App html code

index.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin:0; padding:20px;}
h1 { text-align:center; margin-bottom:20px;}
.tabs { display:flex; flex-wrap:wrap; justify-content:center; margin-bottom:20px; gap:5px; }
.tab { padding:10px 15px; background-color:#007bff; color:white; border:none; cursor:pointer; border-radius:4px 4px 0 0; }
.tab.active { background-color:#0056b3; font-weight:bold;}
#workout-form { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:20px; }
input, select, button { padding:10px; font-size:16px; }
button { cursor:pointer; background-color:#28a745; color:white; border:none; }
button:hover { background-color:#218838; }
ul { list-style:none; padding:0; max-width:650px; margin:0 auto; }
li { background:white; margin:5px 0; padding:10px; border-left:5px solid #28a745; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
.delete-btn { background-color:#dc3545; border:none; padding:5px 10px; color:white; cursor:pointer; margin-left:5px; }
.delete-btn:hover { background-color:#c82333; }
#clear-btn { display:block; margin:20px auto; background-color:#007bff; }
.session-info { flex:1; margin-right:10px; }
.session-meta { font-size:0.9em; color:#555; }
.easy-btn, .stay-btn, .hard-btn { padding:5px 10px; margin-right:5px; border:none; cursor:pointer; color:white; border-radius:3px; }
.easy-btn { background-color:#28a745; }
.stay-btn { background-color:#ffc107; }
.hard-btn { background-color:#dc3545; }
.easy-btn.active, .stay-btn.active, .hard-btn.active { box-shadow: 0 0 0 2px #00000033; }
.superset-select { margin-top:5px; padding:5px; margin-right:5px; }
</style>
</head>
<body>
<h1>Workout Tracker</h1>

<div class="tabs">
  <button class="tab active" data-day="day1_1hr">Day 1 (1hr)</button>
  <button class="tab" data-day="day2_1hr">Day 2 (1hr)</button>
  <button class="tab" data-day="day3_1hr">Day 3 (1hr)</button>
  <button class="tab" data-day="day1_lt1hr">Day 1 (&lt;1hr)</button>
  <button class="tab" data-day="day2_lt1hr">Day 2 (&lt;1hr)</button>
  <button class="tab" data-day="day3_lt1hr">Day 3 (&lt;1hr)</button>
</div>

<form id="workout-form">
  <select id="exercise-input" required>
    <option value="">Select Exercise</option>
  </select>
  <input type="number" id="weight-input" placeholder="Weight" min="0">
  <input type="number" id="reps-input" placeholder="Reps Completed" min="1">
  <input type="number" id="sets-input" placeholder="Sets Completed" min="1">
  <input type="number" id="rest-input" placeholder="Rest (sec)" min="0">
  <select id="side-input">
    <option value="Bilateral">Bilateral</option>
    <option value="Unilateral">Unilateral</option>
  </select>
  <select id="equip-input">
    <option value="">Equipment</option>
    <option value="BB">BB</option>
    <option value="DB">DB</option>
    <option value="KB">KB</option>
    <option value="BW">BW</option>
  </select>
  <button type="submit">Add/Update Session</button>
</form>

<ul id="workout-list"></ul>
<button id="clear-btn">Reset Sessions for This Day</button>

<script>
const tabs = document.querySelectorAll('.tab');
const exerciseInput = document.getElementById('exercise-input');
const weightInput = document.getElementById('weight-input');
const repsInput = document.getElementById('reps-input');
const setsInput = document.getElementById('sets-input');
const restInput = document.getElementById('rest-input');
const sideInput = document.getElementById('side-input');
const equipInput = document.getElementById('equip-input');
const list = document.getElementById('workout-list');
const clearBtn = document.getElementById('clear-btn');

let currentDay = 'day1_1hr';
let workoutsData = {};

// Preloaded workouts
const preloadedWorkouts = {
  day1_1hr:[
    {name:"Squat", sets:3, reps:"12-15", rest:180},
    {name:"RDL", sets:3, reps:"6-8", rest:90},
    {name:"Incline DB Press", sets:3, reps:"6-8", rest:75},
    {name:"Row", sets:3, reps:"8-10", rest:75},
    {name:"Plank", sets:2, reps:60, rest:0}
  ],
  day2_1hr:[
    {name:"Pull-Ups or Lat Pulldown", sets:4, reps:"AMAP", rest:105},
    {name:"DB Bench", sets:3, reps:"8-10", rest:120},
    {name:"Bulgarian Split Squat", sets:3, reps:"8", rest:60},
    {name:"Hamstring Curl", sets:3, reps:"10-12", rest:60},
    {name:"Face Pulls", sets:2, reps:"12-15", rest:60}
  ],
  day3_1hr:[
    {name:"Squat", sets:3, reps:"8-10", rest:90},
    {name:"Hip Thrust or Glute Bridge", sets:3, reps:"8-12", rest:90},
    {name:"DB Row", sets:3, reps:"8-10", rest:90},
    {name:"Incline DB Press", sets:3, reps:"8-10", rest:75},
    {name:"Bi/Tri Superset", sets:2, reps:"10-12", rest:60, biTri:true, options1:["Ez Bar Curl","DB Curl"], options2:["Rope Pushdown","Overhead Ext"]}
  ]
};

// Load from localStorage
if(localStorage.getItem('workoutsData')) workoutsData = JSON.parse(localStorage.getItem('workoutsData'));
else workoutsData = JSON.parse(JSON.stringify(preloadedWorkouts));

function populateExerciseDropdown(){
  exerciseInput.innerHTML = '<option value="">Select Exercise</option>';
  const exercises = workoutsData[currentDay].map(w=>w.name);
  exercises.forEach(ex=>{
    const opt = document.createElement('option');
    opt.value=ex;
    opt.textContent=ex;
    exerciseInput.appendChild(opt);
  });
  exerciseInput.value="";
  weightInput.value="";
  repsInput.value="";
  setsInput.value="";
  restInput.value="";
  sideInput.value="Bilateral";
  equipInput.value="";
}

// Auto-fill main exercise and last session
exerciseInput.addEventListener('change',()=>{
  const session = workoutsData[currentDay].find(s=>s.name===exerciseInput.value);
  if(!session) return;
  weightInput.value = session.last?.weight || "";
  repsInput.value = session.last?.repsCompleted || session.reps || "";
  setsInput.value = session.last?.setsCompleted || session.sets || "";
  restInput.value = session.last?.restCompleted || session.rest || "";
  sideInput.value = session.last?.side || "Bilateral";
  equipInput.value = session.last?.equip || "";
});

function renderWorkouts(){
  list.innerHTML='';
  workoutsData[currentDay].forEach((session,index)=>{
    const li = document.createElement('li');
    let supersetHTML='';
    if(session.biTri && currentDay.includes('day3')){
      const sup1 = session.last?.superset1Selected || session.options1[0];
      const sup2 = session.last?.superset2Selected || session.options2[0];
      supersetHTML=`<div>
        <label>Superset 1:</label>
        <select class="superset-select" id="superset1-${index}">${session.options1.map(o=>`<option value="${o}" ${o===sup1?'selected':''}>${o}</option>`).join('')}</select>
        <span>Mood: <strong>${session.last?.supersetData?.[sup1]?.mood||''}</strong></span>
        <label>Superset 2:</label>
        <select class="superset-select" id="superset2-${index}">${session.options2.map(o=>`<option value="${o}" ${o===sup2?'selected':''}>${o}</option>`).join('')}</select>
        <span>Mood: <strong>${session.last?.supersetData?.[sup2]?.mood||''}</strong></span>
      </div>`;
    }
    const mood=session.last?.mood||"";
    li.innerHTML=`<div class="session-info">
      <strong>${session.name}</strong> - ${session.sets} sets x ${session.reps} reps
      <div class="session-meta">Rest: ${session.rest} sec</div>
      ${supersetHTML}
      <div>
        <button class="easy-btn ${mood==='Easy'?'active':''}">Easy</button>
        <button class="stay-btn ${mood==='Stay'?'active':''}">Stay</button>
        <button class="hard-btn ${mood==='Hard'?'active':''}">Hard</button>
      </div>
    </div>`;
    const delBtn=document.createElement('button');
    delBtn.textContent='Delete';
    delBtn.classList.add('delete-btn');
    delBtn.addEventListener('click',()=>{
      workoutsData[currentDay].splice(index,1);
      localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
      populateExerciseDropdown();
      renderWorkouts();
    });
    li.appendChild(delBtn);
    list.appendChild(li);

    if(session.biTri){
      document.getElementById(`superset1-${index}`).addEventListener('change',e=>{
        if(!session.last) session.last={};
        session.last.superset1Selected=e.target.value;
        if(!session.last.supersetData) session.last.supersetData={};
        if(!session.last.supersetData[e.target.value]) session.last.supersetData[e.target.value]={};
        localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
        renderWorkouts();
      });
      document.getElementById(`superset2-${index}`).addEventListener('change',e=>{
        if(!session.last) session.last={};
        session.last.superset2Selected=e.target.value;
        if(!session.last.supersetData) session.last.supersetData={};
        if(!session.last.supersetData[e.target.value]) session.last.supersetData[e.target.value]={};
        localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
        renderWorkouts();
      });
    }

    // Mood buttons
    li.querySelector('.easy-btn').addEventListener('click',()=>{if(!session.last) session.last={}; session.last.mood='Easy'; localStorage.setItem('workoutsData',JSON.stringify(workoutsData)); renderWorkouts();});
    li.querySelector('.stay-btn').addEventListener('click',()=>{if(!session.last) session.last={}; session.last.mood='Stay'; localStorage.setItem('workoutsData',JSON.stringify(workoutsData)); renderWorkouts();});
    li.querySelector('.hard-btn').addEventListener('click',()=>{if(!session.last) session.last={}; session.last.mood='Hard'; localStorage.setItem('workoutsData',JSON.stringify(workoutsData)); renderWorkouts();});
  });
}

tabs.forEach(tab=>{
  tab.addEventListener('click', ()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentDay = tab.dataset.day;
    populateExerciseDropdown();
    renderWorkouts();
  });
});

document.getElementById('workout-form').addEventListener('submit',e=>{
  e.preventDefault();
  const exName = exerciseInput.value;
  if(!exName) return;
  let session = workoutsData[currentDay].find(s=>s.name===exName);
  if(!session){ session={name:exName}; workoutsData[currentDay].push(session);}
  if(!session.last) session.last={};
  session.last.weight = weightInput.value||"";
  session.last.repsCompleted = repsInput.value||"";
  session.last.setsCompleted = setsInput.value||"";
  session.last.restCompleted = restInput.value||"";
  session.last.side = sideInput.value||"Bilateral";
  session.last.equip = equipInput.value||"";
  localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
  renderWorkouts();
  document.getElementById('workout-form').reset();
});

clearBtn.addEventListener('click', ()=>{
  workoutsData[currentDay] = JSON.parse(JSON.stringify(preloadedWorkouts[currentDay]));
  localStorage.setItem('workoutsData',JSON.stringify(workoutsData));
  populateExerciseDropdown();
  renderWorkouts();
});

populateExerciseDropdown();
renderWorkouts();
</script>
</body>
</html>
