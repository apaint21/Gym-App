<div id="day3_1hr" class="workout-day">
  <h2>Day 3 (1hr)</h2>

  <!-- Squat -->
  <div class="exercise-line">
    <strong>Squat</strong> | Sets: 3 
    <input type="number" placeholder="Reps">
    <input type="number" placeholder="Weight">
    <span class="rest">Rest: 90 sec</span>
    <div class="history" style="font-size:0.8em;color:#555;"></div>
  </div>

  <!-- Hip Thrust or Glute Bridge -->
  <div class="exercise-line">
    <strong>Hip Thrust / Glute Bridge</strong> | Sets: 3
    <input type="number" placeholder="Reps">
    <input type="number" placeholder="Weight">
    <span class="rest">Rest: 90 sec</span>
    <div class="history" style="font-size:0.8em;color:#555;"></div>
  </div>

  <div class="exercise-line">
    <strong>Chest / Back Superset</strong> | Sets: 3
    <div class="sub-line">
      <div class="sub-line-left">
        <select id="sub1-select">
          <option value="">Select Exercise</option>
          <option value="Row">Row</option>
          <option value="Incline Press">Incline Press</option>
        </select>
        <input type="number" placeholder="Reps">
        <input type="number" placeholder="Weight">
        <input type="number" value="3" readonly placeholder="Sets">
      </div>
      <span id="sub1-rest" class="rest">Rest: 60 sec</span>
    </div>
    <div id="sub1-history" style="font-size:0.8em;color:#555;"></div>
  </div>
