Gym Tracker App html code

index.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker - Day 3 (1hr)</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; }
#workout-form { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
input, select, button { padding: 10px; font-size: 16px; }
input[readonly] { background-color: #e9ecef; }
button { cursor: pointer; background-color: #28a745; color: white; border: none; }
button:hover { background-color: #218838; }
ul { list-style: none; padding: 0; max-width: 650px; margin: 0 auto; }
li { background: white; margin: 5px 0; padding: 10px; border-left: 5px solid #28a745; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
.delete-btn { background-color: #dc3545; border: none; padding: 5px 10px; color: white; cursor: pointer; margin-left: 5px; }
.delete-btn:hover { background-color: #c82333; }
.session-info { flex: 1; margin-right: 10px; }
.session-meta { font-size: 0.9em; color: #555; }
.history { font-size: 0.8em; color: #888; margin-top: 5px; }
</style>
</head>
<body>
<h1>Day 3 (1hr) Workout</h1>

<form id="workout-form">
  <select id="exercise-input" required></select>
  <input type="number" id="reps-input" placeholder="Reps Completed" min="1" required>
  <input type="number" id="sets-input" placeholder="Sets" readonly>
  <input type="number" id="weight-input" placeholder="Weight Used">
  <select id="side-input" required>
    <option value="">Single/Both</option>
    <option value="Single Leg/Arm">Single Leg/Arm</option>
    <option value="Bilateral">Both</option>
  </select>
  <select id="equip-input" required>
    <option value="">Equipment</option>
    <option value="BB">Barbell (BB)</option>
    <option value="DB">Dumbbell (DB)</option>
    <option value="KB">Kettlebell (KB)</option>
    <option value="BW">Bodyweight (BW)</option>
  </select>
  <select id="mood-input" required>
    <option value="">Mood</option>
    <option value="Easy">Easy</option>
    <option value="Stay">Stay</option>
    <option value="Hard">Hard</option>
  </select>
  <button type="submit">Add Session</button>
</form>

<!-- Superset dropdowns -->
<div id="superset-container" style="display:none; gap:10px; margin-bottom:15px;">
  <select id="sub1-select"></select>
  <div id="sub1-history" class="history"></div>
  <select id="sub2-select"></select>
  <div id="sub2-history" class="history"></div>
</div>

<ul id="workout-list"></ul>
<button id="clear-btn">Clear All Sessions for Day 3 (1hr)</button>

<script>
const exerciseInput = document.getElementById('exercise-input');
const repsInput = document.getElementById('reps-input');
const setsInput = document.getElementById('sets-input');
const weightInput = document.getElementById('weight-input');
const sideInput = document.getElementById('side-input');
const equipInput = document.getElementById('equip-input');
const moodInput = document.getElementById('mood-input');
const list = document.getElementById('workout-list');
const clearBtn = document.getElementById('clear-btn');
const supersetContainer = document.getElementById('superset-container');
const sub1Select = document.getElementById('sub1-select');
const sub2Select = document.getElementById('sub2-select');
const sub1History = document.getElementById('sub1-history');
const sub2History = document.getElementById('sub2-history');

let workoutsData = JSON.parse(localStorage.getItem('day3_1hr')) || [];

const exercises = [
  { name: 'Squat', sets: 3, reps: '8-10', rest: '90 sec', type:'normal' },
  { name: 'Hip Thrust or Glute Bridge', sets: 3, reps: '8-12', rest: '90 sec', type:'normal' },
  { name: 'Bi/Tri Superset', sets: 2, reps: '10-12', rest: '60 sec', type:'superset', subExercises: [
      { name: 'EZ Bar Curl', lastWeight: '', reps: '' },
      { name: 'Rope Pushdown', lastWeight: '', reps: '' },
      { name: 'DB Curl', lastWeight: '', reps: '' },
      { name: 'Overhead Extension', lastWeight: '', reps: '' }
  ]},
];

function populateExerciseDropdown() {
  exerciseInput.innerHTML = '';
  exercises.forEach(ex => {
    const opt = document.createElement('option');
    opt.value = ex.name;
    opt.textContent = ex.name;
    exerciseInput.appendChild(opt);
  });
}
populateExerciseDropdown();

function renderWorkouts() {
  list.innerHTML = '';
  workoutsData.forEach((session, index) => {
    const li = document.createElement('li');
    li.innerHTML = `<div class="session-info"><strong>${session.exercise}</strong> - ${session.sets} sets x ${session.reps} reps @ ${session.weight} ${session.side} | ${session.equipment} | Mood: ${session.mood}</div>`;
    const delBtn = document.createElement('button');
    delBtn.textContent = 'Delete';
    delBtn.classList.add('delete-btn');
    delBtn.addEventListener('click',()=>{
      workoutsData.splice(index,1);
      localStorage.setItem('day3_1hr', JSON.stringify(workoutsData));
      renderWorkouts();
    });
    li.appendChild(delBtn);
    list.appendChild(li);
  });
}
renderWorkouts();

exerciseInput.addEventListener('change', ()=>{
  const ex = exercises.find(e => e.name === exerciseInput.value);
  setsInput.value = ex.sets;
  
  if(ex.type==='superset'){
    supersetContainer.style.display='flex';
    // populate sub1 and sub2
    sub1Select.innerHTML='';
    sub2Select.innerHTML='';
    ['EZ Bar Curl','Rope Pushdown'].forEach(name=>{
      const o = document.createElement('option'); o.value=name; o.textContent=name; sub1Select.appendChild(o);
    });
    ['DB Curl','Overhead Extension'].forEach(name=>{
      const o = document.createElement('option'); o.value=name; o.textContent=name; sub2Select.appendChild(o);
    });
    sub1History.textContent='';
    sub2History.textContent='';
  } else {
    supersetContainer.style.display='none';
  }
});

function updateHistory(selectElem, historyElem){
  const last = workoutsData.slice().reverse().find(s=>s.exercise===selectElem.value);
  if(last){
    historyElem.textContent = `Last: ${last.reps} reps @ ${last.weight} ${last.side} | ${last.equipment} | Mood: ${last.mood}`;
  } else {
    historyElem.textContent='';
  }
}

sub1Select.addEventListener('change',()=> updateHistory(sub1Select, sub1History));
sub2Select.addEventListener('change',()=> updateHistory(sub2Select, sub2History));

form.addEventListener('submit', e=>{
  e.preventDefault();
  let exerciseName = exerciseInput.value;
  if(exerciseName==='Bi/Tri Superset'){
    // log sub1
    workoutsData.push({
      exercise: sub1Select.value,
      sets: setsInput.value,
      reps: repsInput.value,
      weight: weightInput.value,
      side: sideInput.value,
      equipment: equipInput.value,
      mood: moodInput.value
    });
    // log sub2
    workoutsData.push({
      exercise: sub2Select.value,
      sets: setsInput.value,
      reps: repsInput.value,
      weight: weightInput.value,
      side: sideInput.value,
      equipment: equipInput.value,
      mood: moodInput.value
    });
  } else {
    workoutsData.push({
      exercise: exerciseName,
      sets: setsInput.value,
      reps: repsInput.value,
      weight: weightInput.value,
      side: sideInput.value,
      equipment: equipInput.value,
      mood: moodInput.value
    });
  }
  localStorage.setItem('day3_1hr', JSON.stringify(workoutsData));
  renderWorkouts();
  form.reset();
  setsInput.value = exercises.find(e=>e.name===exerciseInput.value).sets;
  supersetContainer.style.display='none';
});

clearBtn.addEventListener('click', ()=>{
  workoutsData=[];
  localStorage.setItem('day3_1hr', JSON.stringify(workoutsData));
  renderWorkouts();
});
</script>
</body>
</html>
